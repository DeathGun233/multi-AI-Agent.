<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowPilot Console</title>
  <style>
    :root {
      --bg: #f2efe8;
      --panel: rgba(255, 252, 246, 0.92);
      --ink: #1a1917;
      --muted: #666159;
      --line: #e4dbcf;
      --accent: #0d6f54;
      --accent-soft: #d9efe7;
      --warn: #b16a22;
      --warn-soft: #f7e8d6;
      --danger: #b33b2e;
      --danger-soft: #fae0db;
      --shadow: 0 16px 36px rgba(32, 24, 17, 0.08);
      --dark: #191919;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at 0% 0%, rgba(13, 111, 84, 0.14), transparent 28%),
        radial-gradient(circle at 100% 0%, rgba(177, 106, 34, 0.14), transparent 24%),
        linear-gradient(180deg, #faf7f1 0%, var(--bg) 100%);
      min-height: 100vh;
    }
    .shell {
      width: min(1440px, calc(100vw - 28px));
      margin: 18px auto 28px;
      display: grid;
      gap: 16px;
    }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .hero {
      padding: 22px 24px;
      display: grid;
      gap: 12px;
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1;
      letter-spacing: -0.05em;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      max-width: 860px;
    }
    .metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .metric {
      min-width: 140px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.58);
    }
    .metric strong {
      display: block;
      font-size: 22px;
      margin-bottom: 4px;
    }
    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1.2fr) minmax(320px, 0.95fr);
      gap: 16px;
      align-items: start;
    }
    .panel {
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .panel h2 {
      margin: 0;
      font-size: 18px;
    }
    .panel h3 {
      margin: 0;
      font-size: 15px;
    }
    .stack {
      display: grid;
      gap: 12px;
    }
    .section-label {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .template-card,
    .run-card,
    .queue-card,
    .trace-card,
    .result-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.7);
      padding: 14px;
    }
    .template-card button,
    .run-card button,
    .queue-card button {
      all: unset;
      cursor: pointer;
      display: block;
      width: 100%;
    }
    .template-card:hover,
    .run-card:hover,
    .queue-card:hover {
      border-color: #c9b79d;
      transform: translateY(-1px);
      transition: 120ms ease;
    }
    .run-card.active,
    .queue-card.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(13,111,84,0.18);
    }
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
    }
    .badge.success {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: rgba(13,111,84,0.24);
    }
    .badge.warning {
      background: var(--warn-soft);
      color: var(--warn);
      border-color: rgba(177,106,34,0.24);
    }
    .badge.danger {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: rgba(179,59,46,0.24);
    }
    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }
    select, textarea, input, button {
      font: inherit;
    }
    select, textarea, input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.9);
      padding: 12px 14px;
      color: var(--ink);
    }
    textarea {
      min-height: 220px;
      resize: vertical;
      line-height: 1.55;
    }
    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .action {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .action.primary {
      background: linear-gradient(135deg, var(--accent) 0%, #13926d 100%);
      color: #fff;
    }
    .action.secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    .action.warning {
      background: linear-gradient(135deg, var(--warn) 0%, #cf8a44 100%);
      color: #fff;
    }
    .action.danger {
      background: linear-gradient(135deg, var(--danger) 0%, #cb5446 100%);
      color: #fff;
    }
    .mono {
      font-family: "Consolas", "SFMono-Regular", monospace;
      font-size: 13px;
    }
    .trace-list, .result-list {
      display: grid;
      gap: 10px;
    }
    .trace-card small,
    .queue-card small,
    .run-card small,
    .template-card small {
      color: var(--muted);
      display: block;
      line-height: 1.5;
    }
    pre {
      margin: 0;
      padding: 14px;
      border-radius: 14px;
      background: var(--dark);
      color: #f3f3f3;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
      font-size: 13px;
      min-height: 180px;
    }
    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,0.5);
    }
    @media (max-width: 1220px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>FlowPilot Console</h1>
      <p>
        一个真正可操作的企业级 AI 工作流控制台。现在你可以在同一个界面里完成工作流发起、历史追踪、
        人工审核以及 LangGraph 轨迹查看，不再只是单次提交 JSON。
      </p>
      <div class="metrics">
        <div class="metric"><strong id="metricRuns">0</strong><span>累计运行</span></div>
        <div class="metric"><strong id="metricQueue">0</strong><span>待人工审核</span></div>
        <div class="metric"><strong id="metricNodes">0</strong><span>图节点数量</span></div>
      </div>
    </section>

    <section class="layout">
      <aside class="panel">
        <div class="stack">
          <div>
            <div class="section-label">模板中心</div>
            <h2>新建工作流</h2>
          </div>
          <div id="templateList" class="stack"></div>
        </div>
        <div class="stack">
          <div>
            <div class="section-label">审核队列</div>
            <h2>待人工处理</h2>
          </div>
          <div id="reviewQueue" class="stack"></div>
        </div>
      </aside>

      <section class="panel">
        <div class="stack">
          <div>
            <div class="section-label">运行入口</div>
            <h2>工作流发起器</h2>
          </div>
          <div>
            <label for="workflowType">工作流类型</label>
            <select id="workflowType"></select>
          </div>
          <div>
            <label for="payload">输入 JSON</label>
            <textarea id="payload"></textarea>
          </div>
          <div class="button-row">
            <button class="action primary" id="runButton">执行工作流</button>
            <button class="action secondary" id="refreshButton">刷新控制台</button>
          </div>
        </div>

        <div class="stack">
          <div>
            <div class="section-label">运行历史</div>
            <h2>最近任务</h2>
          </div>
          <div id="runHistory" class="stack"></div>
        </div>
      </section>

      <section class="panel">
        <div class="stack">
          <div>
            <div class="section-label">执行详情</div>
            <h2 id="detailTitle">等待选择任务</h2>
          </div>
          <div id="detailMeta" class="badge-row"></div>
          <div class="result-card">
            <h3>结果摘要</h3>
            <div id="summaryCards" class="result-list"></div>
          </div>
          <div class="result-card">
            <h3>人工审核动作</h3>
            <div class="stack">
              <input id="reviewComment" placeholder="填写审核备注，可选" />
              <div class="button-row">
                <button class="action warning" id="approveButton">人工通过</button>
                <button class="action danger" id="rejectButton">人工驳回</button>
              </div>
            </div>
          </div>
          <div class="result-card">
            <h3>LangGraph 图结构</h3>
            <pre id="graphView">加载中...</pre>
          </div>
          <div class="result-card">
            <h3>执行轨迹</h3>
            <div id="traceList" class="trace-list"></div>
          </div>
          <div class="result-card">
            <h3>完整结果 JSON</h3>
            <pre id="resultView">等待运行...</pre>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const templates = {{ templates|tojson }};
    const templateList = document.getElementById("templateList");
    const workflowType = document.getElementById("workflowType");
    const payload = document.getElementById("payload");
    const runButton = document.getElementById("runButton");
    const refreshButton = document.getElementById("refreshButton");
    const runHistory = document.getElementById("runHistory");
    const reviewQueue = document.getElementById("reviewQueue");
    const resultView = document.getElementById("resultView");
    const graphView = document.getElementById("graphView");
    const traceList = document.getElementById("traceList");
    const detailTitle = document.getElementById("detailTitle");
    const detailMeta = document.getElementById("detailMeta");
    const summaryCards = document.getElementById("summaryCards");
    const approveButton = document.getElementById("approveButton");
    const rejectButton = document.getElementById("rejectButton");
    const reviewComment = document.getElementById("reviewComment");
    const metricRuns = document.getElementById("metricRuns");
    const metricQueue = document.getElementById("metricQueue");
    const metricNodes = document.getElementById("metricNodes");

    let currentRun = null;
    let workflowGraph = null;

    function statusClass(status) {
      if (status === "completed") return "success";
      if (status === "waiting_human" || status === "reviewing") return "warning";
      if (status === "failed") return "danger";
      return "";
    }

    function humanizeWorkflow(type) {
      const match = templates.find((item) => item.workflow_type === type);
      return match ? match.title : type;
    }

    function badge(text, cls = "") {
      return `<span class="badge ${cls}">${text}</span>`;
    }

    function loadTemplate(template) {
      workflowType.value = template.workflow_type;
      payload.value = JSON.stringify(template.sample_payload, null, 2);
    }

    function renderTemplates() {
      templateList.innerHTML = "";
      workflowType.innerHTML = "";
      templates.forEach((template) => {
        const option = document.createElement("option");
        option.value = template.workflow_type;
        option.textContent = template.title;
        workflowType.appendChild(option);

        const wrapper = document.createElement("div");
        wrapper.className = "template-card";
        wrapper.innerHTML = `
          <button type="button">
            <strong>${template.title}</strong>
            <small>${template.description}</small>
          </button>
        `;
        wrapper.querySelector("button").addEventListener("click", () => loadTemplate(template));
        templateList.appendChild(wrapper);
      });
      loadTemplate(templates[0]);
    }

    function renderHistory(runs) {
      metricRuns.textContent = runs.length;
      runHistory.innerHTML = "";
      if (!runs.length) {
        runHistory.innerHTML = `<div class="empty">还没有运行记录</div>`;
        return;
      }
      runs.forEach((run) => {
        const wrapper = document.createElement("div");
        wrapper.className = `run-card ${currentRun && currentRun.id === run.id ? "active" : ""}`;
        wrapper.innerHTML = `
          <button type="button">
            <strong>${humanizeWorkflow(run.workflow_type)}</strong>
            <div class="badge-row">
              ${badge(run.status, statusClass(run.status))}
              ${badge(run.current_step)}
            </div>
            <small>ID: <span class="mono">${run.id}</span></small>
            <small>${new Date(run.updated_at).toLocaleString()}</small>
          </button>
        `;
        wrapper.querySelector("button").addEventListener("click", () => loadRun(run.id));
        runHistory.appendChild(wrapper);
      });
    }

    function renderQueue(queue) {
      metricQueue.textContent = queue.length;
      reviewQueue.innerHTML = "";
      if (!queue.length) {
        reviewQueue.innerHTML = `<div class="empty">当前没有待人工审核任务</div>`;
        return;
      }
      queue.forEach((run) => {
        const wrapper = document.createElement("div");
        wrapper.className = `queue-card ${currentRun && currentRun.id === run.id ? "active" : ""}`;
        const reason = (run.review?.reasons || [])[0] || "等待人工处理";
        wrapper.innerHTML = `
          <button type="button">
            <strong>${humanizeWorkflow(run.workflow_type)}</strong>
            <div class="badge-row">
              ${badge("待人工审核", "warning")}
            </div>
            <small>${reason}</small>
          </button>
        `;
        wrapper.querySelector("button").addEventListener("click", () => loadRun(run.id));
        reviewQueue.appendChild(wrapper);
      });
    }

    function renderDetail(run) {
      currentRun = run;
      detailTitle.textContent = `${humanizeWorkflow(run.workflow_type)} · ${run.id.slice(0, 8)}`;
      detailMeta.innerHTML = `
        ${badge(run.status, statusClass(run.status))}
        ${badge(run.current_step)}
        ${badge(run.review?.needs_human_review ? "需要人工" : "自动闭环", run.review?.needs_human_review ? "warning" : "success")}
      `;

      summaryCards.innerHTML = "";
      const cards = [
        { title: "目标", value: run.objective || "未生成" },
        { title: "计划步骤", value: (run.plan?.steps || []).join(" -> ") || "未生成" },
        { title: "审核结论", value: (run.review?.reasons || []).join("；") || "暂无" },
      ];
      cards.forEach((item) => {
        const div = document.createElement("div");
        div.className = "result-card";
        div.innerHTML = `<h3>${item.title}</h3><small>${item.value}</small>`;
        summaryCards.appendChild(div);
      });

      traceList.innerHTML = "";
      (run.logs || []).forEach((log) => {
        const trace = document.createElement("div");
        trace.className = "trace-card";
        const tool = log.tool_call ? `<small>工具：${log.tool_call.name}</small>` : "";
        trace.innerHTML = `
          <strong>${log.agent}</strong>
          <small>${new Date(log.timestamp).toLocaleString()}</small>
          <small>${log.message}</small>
          ${tool}
        `;
        traceList.appendChild(trace);
      });
      if (!run.logs?.length) {
        traceList.innerHTML = `<div class="empty">暂无执行轨迹</div>`;
      }

      resultView.textContent = JSON.stringify(run, null, 2);
      updateReviewButtons(run);
    }

    function updateReviewButtons(run) {
      const disabled = !run || run.status !== "waiting_human";
      approveButton.disabled = disabled;
      rejectButton.disabled = disabled;
      approveButton.style.opacity = disabled ? "0.5" : "1";
      rejectButton.style.opacity = disabled ? "0.5" : "1";
    }

    async function fetchJson(url, options = undefined) {
      const response = await fetch(url, options);
      return response.json();
    }

    async function loadRun(runId) {
      const run = await fetchJson(`/api/workflows/${runId}`);
      renderDetail(run);
      await refreshSidebar();
    }

    async function refreshSidebar() {
      const [runs, queue] = await Promise.all([
        fetchJson("/api/workflows"),
        fetchJson("/api/workflows/review-queue"),
      ]);
      renderHistory(runs);
      renderQueue(queue);
    }

    async function refreshGraph() {
      workflowGraph = await fetchJson("/api/workflows/graph");
      graphView.textContent = JSON.stringify(workflowGraph, null, 2);
      metricNodes.textContent = workflowGraph.nodes.length;
    }

    async function runWorkflow() {
      let parsed;
      try {
        parsed = JSON.parse(payload.value);
      } catch (error) {
        resultView.textContent = `JSON 解析失败: ${error.message}`;
        return;
      }
      const body = await fetchJson("/api/workflows/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          workflow_type: workflowType.value,
          input_payload: parsed,
        }),
      });
      renderDetail(body);
      await refreshSidebar();
    }

    async function submitReview(approve) {
      if (!currentRun || currentRun.status !== "waiting_human") return;
      const body = await fetchJson(`/api/workflows/${currentRun.id}/review`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          approve,
          comment: reviewComment.value,
        }),
      });
      reviewComment.value = "";
      renderDetail(body);
      await refreshSidebar();
    }

    runButton.addEventListener("click", runWorkflow);
    refreshButton.addEventListener("click", async () => {
      await refreshSidebar();
      await refreshGraph();
      if (currentRun) {
        await loadRun(currentRun.id);
      }
    });
    approveButton.addEventListener("click", () => submitReview(true));
    rejectButton.addEventListener("click", () => submitReview(false));

    renderTemplates();
    refreshSidebar();
    refreshGraph();
  </script>
</body>
</html>
