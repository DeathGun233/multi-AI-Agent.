<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ settings.app_name }}</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --card: #fffaf2;
      --ink: #222018;
      --muted: #6f6758;
      --line: #d6c9b3;
      --brand: #b64c2d;
      --brand-dark: #1d1b18;
      --good: #2f7d52;
      --warn: #a46b11;
      --bad: #9f3121;
      --notice: #2c5b95;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(182,76,45,.12), transparent 32%),
        radial-gradient(circle at top right, rgba(29,27,24,.08), transparent 30%),
        var(--bg);
    }
    a { color: inherit; text-decoration: none; }
    .layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .sidebar {
      padding: 28px 18px;
      border-right: 1px solid var(--line);
      background: rgba(255,250,242,.86);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .brand { font-size: 28px; font-weight: 800; letter-spacing: .02em; }
    .subtle, .muted { color: var(--muted); font-size: 14px; line-height: 1.6; }
    .nav { display: grid; gap: 10px; margin: 24px 0; }
    .nav a {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid transparent;
      color: var(--muted);
    }
    .nav a.active, .nav a:hover {
      color: var(--ink);
      border-color: var(--line);
      background: var(--card);
    }
    .content { padding: 28px; }
    .header { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 24px; }
    .header h1 { margin: 0; font-size: 28px; }
    .header p { margin: 6px 0 0; color: var(--muted); }
    .grid { display: grid; gap: 18px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 8px 30px rgba(34,32,24,.05);
    }
    .card h2, .card h3 { margin: 0 0 12px; }
    .stack { display: grid; gap: 12px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      background: rgba(255,255,255,.5);
    }
    .status-completed { color: var(--good); }
    .status-waiting_human { color: var(--warn); }
    .status-failed { color: var(--bad); }
    .alert-healthy { border-color: rgba(47,125,82,.28); background: rgba(47,125,82,.08); }
    .alert-notice { border-color: rgba(44,91,149,.28); background: rgba(44,91,149,.08); }
    .alert-warning { border-color: rgba(164,107,17,.28); background: rgba(164,107,17,.09); }
    .alert-danger { border-color: rgba(159,49,33,.28); background: rgba(159,49,33,.10); }
    .btn, button {
      border: 0;
      border-radius: 12px;
      background: var(--brand);
      color: white;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn.secondary, button.secondary { background: var(--brand-dark); }
    .btn.ghost, button.ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    input, select, textarea {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fffdf9;
      color: var(--ink);
      font: inherit;
    }
    textarea { min-height: 130px; resize: vertical; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid var(--line); vertical-align: top; text-align: left; }
    th { color: var(--muted); font-weight: 600; }
    code, pre { font-family: "Cascadia Code", "SFMono-Regular", monospace; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: #171612;
      color: #f6f3eb;
      padding: 16px;
      border-radius: 18px;
      overflow: auto;
    }
    .timeline-list { display: grid; gap: 14px; margin-top: 18px; }
    .timeline-row { display: grid; grid-template-columns: 28px 1fr; gap: 14px; align-items: start; }
    .timeline-marker { position: relative; min-height: 100%; display: flex; justify-content: center; }
    .timeline-marker::after {
      content: "";
      position: absolute;
      top: 18px;
      bottom: -14px;
      width: 2px;
      background: var(--line);
    }
    .timeline-row:last-child .timeline-marker::after { display: none; }
    .timeline-dot {
      position: relative;
      z-index: 1;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin-top: 4px;
      background: var(--brand);
      border: 3px solid #fff;
      box-shadow: 0 0 0 1px var(--line);
    }
    .timeline-card {
      background: rgba(255, 250, 242, .95);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: 0 6px 20px rgba(34,32,24,.05);
    }
    .timeline-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .timeline-agent { font-weight: 700; font-size: 15px; line-height: 1.4; }
    .timeline-meta { color: var(--muted); font-size: 12px; }
    .timeline-message { margin-top: 8px; line-height: 1.7; }
    .timeline-tool { margin-top: 10px; }
    .metric { font-size: 28px; font-weight: 800; margin: 8px 0 4px; }
    .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .filter-grid { display: grid; gap: 12px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .bar-group { display: grid; gap: 10px; }
    .bar-row { display: grid; gap: 6px; }
    .bar-label { display: flex; justify-content: space-between; gap: 12px; font-size: 13px; }
    .bar-track {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(0,0,0,.06);
    }
    .bar-fill-candidate,
    .bar-fill-baseline { height: 100%; border-radius: 999px; }
    .bar-fill-candidate { background: linear-gradient(90deg, #1d1b18, #b64c2d); }
    .bar-fill-baseline { background: linear-gradient(90deg, #d7a45a, #8c7b5f); }
    .empty-state {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 18px;
      color: var(--muted);
      text-align: center;
    }
    details {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      background: rgba(255,255,255,.35);
    }
    details summary {
      cursor: pointer;
      font-weight: 700;
      list-style: none;
    }
    details summary::-webkit-details-marker { display: none; }
    .field-tip {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }
    .field-error {
      color: var(--bad);
      font-size: 12px;
      line-height: 1.6;
      min-height: 18px;
    }
    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .grid.two, .grid.three, .filter-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
{% if current_user %}
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">FlowPilot</div>
      <p class="subtle">一个面向企业场景的多智能体 AI 应用实验台，聚焦工作流执行、模型对比、人工审核与效果评测。</p>
      <nav class="nav">
        <a href="/dashboard" class="{% if active_page == 'dashboard' %}active{% endif %}">总览面板</a>
        <a href="/runs" class="{% if active_page == 'runs' %}active{% endif %}">运行历史</a>
        <a href="/reviews" class="{% if active_page == 'reviews' %}active{% endif %}">审核中心</a>
        <a href="/compare" class="{% if active_page == 'compare' %}active{% endif %}">方案对比</a>
        <a href="/evaluations" class="{% if active_page == 'evaluations' %}active{% endif %}">自动评测</a>
        <a href="/prompts" class="{% if active_page == 'prompts' %}active{% endif %}">Prompt 方案</a>
        <a href="/costs" class="{% if active_page == 'costs' %}active{% endif %}">成本看板</a>
        <a href="/batches" class="{% if active_page == 'batches' %}active{% endif %}">批量实验</a>
      </nav>
      <div class="card stack">
        <div>
          <strong>{{ current_user.display_name }}</strong>
          <div class="subtle">{{ role_label(current_user.role) }}</div>
        </div>
        <form action="/logout" method="post">
          <button class="ghost" type="submit">退出登录</button>
        </form>
      </div>
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
{% else %}
  {% block auth_content %}{% endblock %}
{% endif %}
</body>
</html>
