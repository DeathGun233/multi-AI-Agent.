{% extends "base.html" %}
{% block auth_content %}
<div style="min-height:100vh;display:grid;place-items:center;padding:24px;">
  <div class="card" style="width:min(480px, 100%);">
    <div class="header" style="display:block;margin-bottom:18px;">
      <h1>FlowPilot</h1>
      <p>Sign in to open the multi-agent workflow lab.</p>
    </div>
    {% if error %}
    <div class="badge" style="color:var(--bad);margin-bottom:12px;">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="stack">
      <input type="hidden" name="next" value="{{ next }}">
      <label>Username<input name="username" autocomplete="username"></label>
      <label>Password<input name="password" type="password" autocomplete="current-password"></label>
      <button type="submit">Sign in</button>
    </form>
    <div class="card" style="margin-top:16px;">
      <strong>Demo accounts</strong>
      <div class="subtle" style="margin-top:8px;">admin / admin123</div>
      <div class="subtle">reviewer / reviewer123</div>
      <div class="subtle">operator / operator123</div>
      <div class="subtle">viewer / viewer123</div>
    </div>
  </div>
</div>
{% endblock %}
