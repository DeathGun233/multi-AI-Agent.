<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 FlowPilot</title>
  <style>
    :root {
      --bg: #f4f1eb;
      --panel: rgba(255, 252, 246, 0.94);
      --ink: #181715;
      --muted: #6b645b;
      --line: #dfd4c6;
      --accent: #116149;
      --accent-soft: #ddefe7;
      --shadow: 0 18px 40px rgba(32, 24, 17, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, rgba(17, 97, 73, 0.14), transparent 24%),
        radial-gradient(circle at 90% 10%, rgba(177, 106, 34, 0.14), transparent 24%),
        linear-gradient(180deg, #faf7f1 0%, var(--bg) 100%);
      padding: 24px;
    }
    .shell {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(38px, 6vw, 64px);
      line-height: 0.96;
      letter-spacing: -0.06em;
    }
    .hero p, .hint, .demo {
      color: var(--muted);
      line-height: 1.7;
    }
    .badge {
      display: inline-flex;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      margin-bottom: 16px;
      font-size: 13px;
    }
    form {
      display: grid;
      gap: 14px;
    }
    label {
      display: grid;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      font: inherit;
    }
    button {
      min-height: 44px;
      border: 0;
      border-radius: 14px;
      background: var(--ink);
      color: white;
      cursor: pointer;
      font: inherit;
    }
    .error {
      padding: 12px 14px;
      border-radius: 14px;
      background: #fae0db;
      color: #b33b2e;
      border: 1px solid #f0c7bd;
    }
    .demo {
      margin-top: 10px;
      font-size: 13px;
      padding: 14px;
      border-radius: 16px;
      border: 1px dashed var(--line);
      background: rgba(255, 255, 255, 0.56);
    }
    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="badge">多 Agent 工作台</div>
      <h1>登录后进入企业流程驾驶舱</h1>
      <p>这一版已经补上独立多页面、审核中心、运行历史和执行时间线。登录后可以按角色进入不同权限范围的工作区。</p>
      <div class="demo">
        演示账号：
        <br />管理员 `admin / admin123`
        <br />审核员 `reviewer / reviewer123`
        <br />运营 `operator / operator123`
        <br />观察员 `viewer / viewer123`
      </div>
    </section>
    <section class="panel">
      <h2 style="margin-top: 0;">登录</h2>
      <p class="hint">默认使用签名 Cookie 维持登录态，后续可以平滑替换成企业 SSO 或正式用户系统。</p>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <input type="hidden" name="next" value="{{ next }}" />
        <label>
          用户名
          <input name="username" placeholder="请输入用户名" autocomplete="username" />
        </label>
        <label>
          密码
          <input type="password" name="password" placeholder="请输入密码" autocomplete="current-password" />
        </label>
        <button type="submit">进入工作台</button>
      </form>
    </section>
  </div>
</body>
</html>
